<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Instant Anti-White-Flash & Theme Hydration Script -->
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (savedTheme === 'dark' || (!savedTheme && prefersDark) || savedTheme === null) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#0a0b10';
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.backgroundColor = '#f8fafc';
          }
        } catch (e) {}
      })();
    </script>
    <style>
      html, body, #root {
        background-color: #0a0b10;
        color: #f4f4f5;
      }
      html:not(.dark), html:not(.dark) body, html:not(.dark) #root {
        background-color: #f8fafc;
        color: #0f172a;
      }
    </style>
    
    <!-- Primary Meta Tags -->
    <title>KINETIX UI | Next-Gen Front-end Development</title>
    <meta name="title" content="KINETIX UI | Next-Gen Front-end Development" />
    <meta name="description" content="KINETIX UI — Next-Gen Front-end Development Co. High-performance, GPU-accelerated interactive web dashboards, bento grid spaces, and extreme-fidelity React applications." />
    <meta name="author" content="KINETIX UI" />
